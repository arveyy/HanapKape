<!DOCTYPE html>
<html>
<head>
    <title>Leaflet Map - HanapKape</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
        .locate-button {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .locate-button:hover { background: #f4f4f4; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button class="locate-button" onclick="locateUser()">Find My Location</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([14.5995, 120.9842], 15);
        
        const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap contributors'
        });

        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        });

        // Start with light tiles
        lightTiles.addTo(map);

        function setMapTheme(theme) {
            if (theme === 'dark') {
                map.removeLayer(lightTiles);
                darkTiles.addTo(map);
            } else {
                map.removeLayer(darkTiles);
                lightTiles.addTo(map);
            }
        }

        // Define Icons
        const userIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        const shopIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        let userMarker;
        let shopMarkers = [];

        function clearShops() {
            shopMarkers.forEach(m => map.removeLayer(m));
            shopMarkers = [];
        }

        function addShopMarker(lat, lng, name, address) {
            const marker = L.marker([lat, lng], { icon: shopIcon }).addTo(map);
            marker.bindPopup("<b>" + name + "</b><br>" + address);
            shopMarkers.push(marker);
        }

        function locateUser() {
            map.locate({setView: true, maxZoom: 16});
        }

        map.on('locationfound', function(e) {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(e.latlng, { icon: userIcon }).addTo(map).bindPopup("You are here").openPopup();
            window.chrome.webview.postMessage({ type: "LOCATION_FOUND", lat: e.latlng.lat, lng: e.latlng.lng });
        });

        map.on('locationerror', function(e) {
            console.log("Location error: " + e.message);
            const center = map.getCenter();
            window.chrome.webview.postMessage({ type: "MAP_MOVE", lat: center.lat, lng: center.lng });
        });

        map.on('moveend', function() {
            const center = map.getCenter();
            window.chrome.webview.postMessage({ type: "MAP_MOVE", lat: center.lat, lng: center.lng });
        });

        window.onload = function() {
            setTimeout(locateUser, 1000);
        };
    </script>
</body>
</html>
